name: Self Repair Orchestration SOP
version: 1
nodes:
  - id: start
    name: Start
    type: nous.agent.custom
    position: [0, 0]
    parameters:
      promptRef: workflow://self-repair-orchestration-sop/start
  - id: route-entrypoint
    name: Route Entrypoint
    type: nous.agent.custom
    position: [220, 0]
    parameters:
      promptRef: workflow://self-repair-orchestration-sop/route-entrypoint
  - id: run-hygiene-sentry
    name: Run Hygiene Sentry
    type: nous.condition.switch
    position: [480, 0]
    parameters:
      expression: hygiene.route
      cases:
        requires-fail-context: compile-fail-context
        approved-repair-execution: choose-implementation-mode
        clean-fast-close: finalize-self-repair-report
  - id: compile-fail-context
    name: Compile Fail Context
    type: nous.agent.custom
    position: [760, -220]
    parameters:
      promptRef: workflow://self-repair-orchestration-sop/compile-fail-context
  - id: emit-self-repair-intent
    name: Emit Self Repair Intent
    type: nous.agent.custom
    position: [1020, -220]
    parameters:
      promptRef: workflow://self-repair-orchestration-sop/emit-self-repair-intent
  - id: build-diagnosis-proposal
    name: Build Diagnosis Proposal
    type: nous.agent.custom
    position: [1280, -220]
    parameters:
      promptRef: workflow://self-repair-orchestration-sop/build-diagnosis-proposal
  - id: request-cortex-approval
    name: Request Cortex Approval
    type: nous.governance.pfc-gate
    position: [1540, -220]
    parameters:
      tier: 4
      action: block
  - id: choose-implementation-mode
    name: Choose Implementation Mode
    type: nous.condition.switch
    position: [1540, 0]
    parameters:
      expression: implementation.mode
      cases:
        direct: execute-remediation-direct
        dispatch-team: dispatch-remediation-team
  - id: execute-remediation-direct
    name: Execute Remediation Direct
    type: nous.agent.custom
    position: [1800, -120]
    parameters:
      promptRef: workflow://self-repair-orchestration-sop/execute-remediation-direct
  - id: dispatch-remediation-team
    name: Dispatch Remediation Team
    type: nous.agent.custom
    position: [1800, 120]
    parameters:
      promptRef: workflow://self-repair-orchestration-sop/dispatch-remediation-team
  - id: revalidate-closure
    name: Revalidate Closure
    type: nous.agent.custom
    position: [2060, 0]
    parameters:
      promptRef: workflow://self-repair-orchestration-sop/revalidate-closure
  - id: run-benchmark-gates
    name: Run Benchmark Gates
    type: nous.governance.witness-checkpoint
    position: [2320, 0]
    parameters:
      label: benchmark-guardrails
  - id: finalize-self-repair-report
    name: Finalize Self Repair Report
    type: nous.agent.custom
    position: [2580, 120]
    parameters:
      promptRef: workflow://self-repair-orchestration-sop/finalize-self-repair-report
connections:
  - from: start
    to: route-entrypoint
  - from: route-entrypoint
    to: run-hygiene-sentry
  - from: run-hygiene-sentry
    to: compile-fail-context
    output: requires-fail-context
  - from: run-hygiene-sentry
    to: choose-implementation-mode
    output: approved-repair-execution
  - from: run-hygiene-sentry
    to: finalize-self-repair-report
    output: clean-fast-close
  - from: compile-fail-context
    to: emit-self-repair-intent
  - from: emit-self-repair-intent
    to: build-diagnosis-proposal
  - from: build-diagnosis-proposal
    to: request-cortex-approval
  - from: request-cortex-approval
    to: choose-implementation-mode
    output: approved
  - from: request-cortex-approval
    to: build-diagnosis-proposal
    output: conditional
  - from: request-cortex-approval
    to: finalize-self-repair-report
    output: rejected
  - from: choose-implementation-mode
    to: execute-remediation-direct
    output: direct
  - from: choose-implementation-mode
    to: dispatch-remediation-team
    output: dispatch-team
  - from: execute-remediation-direct
    to: revalidate-closure
  - from: dispatch-remediation-team
    to: revalidate-closure
  - from: revalidate-closure
    to: run-benchmark-gates
  - from: run-benchmark-gates
    to: finalize-self-repair-report
