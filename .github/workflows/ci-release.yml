name: CI Release

# Tier 4: Confirms promoted release branch health and preserves release evidence
# Same structure as T3

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '**.mdx'
      - '.architecture'
      - '.worklog'
      - '.skills'
      - 'docs/**'
      - 'LICENSE*'

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test (with coverage)
        run: pnpm run test --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Per-package coverage collection
        run: |
          PACKAGES=("self/cortex/core" "self/apps/desktop" "self/shared")
          for PKG in "${PACKAGES[@]}"; do
            echo "::group::Coverage for $PKG"
            pnpm --filter "./$PKG" exec vitest run --coverage --coverage.reporter=lcov --coverage.reportsDirectory=./coverage 2>/dev/null || echo "[coverage] $PKG: test run failed"
            echo "::endgroup::"
          done

      - name: Coverage floor check
        run: |
          node -e "
            const fs = require('fs');
            const thresholds = JSON.parse(fs.readFileSync('.coverage-thresholds.json', 'utf-8'));
            let failed = false;
            for (const [pkg, config] of Object.entries(thresholds.packages)) {
              const lcovPath = pkg + '/coverage/lcov.info';
              let pct = 0;
              if (fs.existsSync(lcovPath)) {
                const content = fs.readFileSync(lcovPath, 'utf-8');
                const lines = content.split('\n').filter(l => l.startsWith('DA:'));
                const hits = lines.filter(l => !l.endsWith(',0')).length;
                pct = lines.length > 0 ? Math.floor(hits * 100 / lines.length) : 0;
              }
              const floor = config.lines;
              const status = pct >= floor ? 'PASS' : 'FAIL';
              console.log('[coverage] ' + pkg + ': ' + pct + '% lines (floor: ' + floor + '%) — ' + status);
              if (pct < floor) failed = true;
            }
            if (failed) {
              console.error('Coverage floor check failed — one or more packages below threshold');
              process.exit(1);
            }
            console.log('Coverage floor check passed');
          "

      - name: Upload per-package coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: per-package-coverage
          path: |
            self/cortex/core/coverage/lcov.info
            self/apps/desktop/coverage/lcov.info
            self/shared/coverage/lcov.info
          if-no-files-found: ignore

      - name: Benchmark Tier 0
        run: pnpm run benchmark:tier0

  desktop:
    name: Desktop (${{ matrix.os }})
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Download Electron binary
        run: node node_modules/electron/install.js

      - name: Build desktop distributable
        run: pnpm --filter @nous/desktop run build:dist

  webapp-smoke:
    name: Smoke (web)
    needs: check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Start server and verify
        run: |
          cd self/apps/web
          npx next start -p 3123 &
          SERVER_PID=$!
          sleep 5
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3123/ || echo "000")
          kill $SERVER_PID 2>/dev/null || true
          if [ "$STATUS" = "000" ]; then
            echo "::error::Web app failed to start — no response on localhost:3123"
            exit 1
          elif [ "$STATUS" -ge 500 ]; then
            echo "::error::Web app returned HTTP $STATUS"
            exit 1
          else
            echo "Web app smoke start passed (HTTP $STATUS)"
          fi
