name: CI Release Candidate

# Tier 3: Validates release readiness before promotion to main
# Full cross-platform matrix, coverage, benchmarks

on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging]

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test
        if: matrix.os != 'ubuntu-latest'
        run: pnpm run test

      - name: Test (with coverage)
        if: matrix.os == 'ubuntu-latest'
        run: pnpm run test --coverage

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

      - name: Benchmark Tier 0
        run: pnpm run benchmark:tier0

      - name: Web app smoke start
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd self/apps/web
          npx next start -p 3123 &
          SERVER_PID=$!
          sleep 5
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3123/ || echo "000")
          kill $SERVER_PID 2>/dev/null || true
          if [ "$STATUS" = "000" ]; then
            echo "::error::Web app failed to start — no response on localhost:3123"
            exit 1
          elif [ "$STATUS" -ge 500 ]; then
            echo "::error::Web app returned HTTP $STATUS"
            exit 1
          else
            echo "Web app smoke start passed (HTTP $STATUS)"
          fi
