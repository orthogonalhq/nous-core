name: CI Release Candidate

# Tier 3: Validates release readiness before promotion to main
# Full cross-platform matrix, coverage, benchmarks

on:
  pull_request:
    branches: [staging]

jobs:
  scope-guard:
    name: Scope Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mixed-scope fail-close guard
        run: |
          python scripts/check_mixed_scope.py \
            --base-ref "${{ github.event.pull_request.base.sha }}" \
            --head-ref "${{ github.sha }}"

  check:
    name: Check (${{ matrix.os }})
    needs: scope-guard
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test
        if: matrix.os != 'ubuntu-latest'
        run: pnpm run test

      - name: Test (with coverage)
        if: matrix.os == 'ubuntu-latest'
        run: pnpm run test --coverage

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

      - name: Benchmark Tier 0
        run: pnpm run benchmark:tier0
